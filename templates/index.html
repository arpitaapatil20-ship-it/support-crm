<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupportDesk — CRM</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>

    <!-- ════════════════════════════════════════════
     App Shell
════════════════════════════════════════════ -->
    <div class="app">

        <!-- ── Sidebar ─────────────────────────────── -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-mark">
                    <div class="logo-icon">🎧</div>
                    <div class="logo-text">Support<span>Desk</span></div>
                </div>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section-label">Navigation</div>

                <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
                    <span class="nav-icon">📊</span> Dashboard
                </div>
                <div class="nav-item" id="nav-tickets" onclick="navigate('tickets')">
                    <span class="nav-icon">🎫</span> All Tickets
                    <span class="nav-badge" id="open-badge">—</span>
                </div>
                <div class="nav-item" onclick="openCreateModal()">
                    <span class="nav-icon">✚</span> New Ticket
                </div>

                <div class="nav-section-label" style="margin-top:8px">Quick Filters</div>
                <div class="nav-item" onclick="navWithFilter('Open')">
                    <span class="nav-icon">🔴</span> Open
                </div>
                <div class="nav-item" onclick="navWithFilter('In Progress')">
                    <span class="nav-icon">🟡</span> In Progress
                </div>
                <div class="nav-item" onclick="navWithFilter('Closed')">
                    <span class="nav-icon">🟢</span> Closed
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="avatar">SA</div>
                <div>
                    <div class="footer-name">Support Agent</div>
                    <div class="footer-role">admin@company.io</div>
                </div>
            </div>
        </nav>

        <!-- ── Main ────────────────────────────────── -->
        <div class="main">

            <!-- Topbar -->
            <header class="topbar">
                <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
                <div class="topbar-title" id="topbar-title">Dashboard</div>

                <div class="search-wrap">
                    <svg class="s-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" class="search-input" id="global-search" placeholder="Search tickets… (Ctrl K)"
                        oninput="handleSearch(this.value)" autocomplete="off" />
                </div>

                <div class="topbar-actions">
                    <button class="btn btn-primary" onclick="openCreateModal()">＋ New Ticket</button>
                </div>
            </header>

            <!-- Dynamic page content -->
            <div class="page" id="page-content">
                <div class="loading-state">
                    <div class="spinner"></div> Loading…
                </div>
            </div>

        </div><!-- /main -->
    </div><!-- /app -->


    <!-- ════════════════════════════════════════════
     Create Ticket Modal
════════════════════════════════════════════ -->
    <div class="overlay" id="create-modal" style="display:none" onclick="overlayClick(event,'create-modal')">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-h2">
            <div class="modal-header">
                <h2 id="modal-h2">Create New Ticket</h2>
                <button class="close-btn" onclick="closeModal('create-modal')" aria-label="Close">✕</button>
            </div>

            <div class="modal-body">
                <div class="form-grid">

                    <div class="form-group">
                        <label class="form-label" for="f-name">Customer Name <span class="req">*</span></label>
                        <input id="f-name" class="form-control" placeholder="Jane Doe" />
                        <div class="form-error" id="e-name"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="f-email">Email Address <span class="req">*</span></label>
                        <input id="f-email" class="form-control" type="email" placeholder="jane@company.com" />
                        <div class="form-error" id="e-email"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="f-priority">Priority</label>
                        <select id="f-priority" class="form-control">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label class="form-label" for="f-subject">Issue Subject <span class="req">*</span></label>
                        <input id="f-subject" class="form-control" placeholder="Brief description of the issue" />
                        <div class="form-error" id="e-subject"></div>
                    </div>

                    <div class="form-group full">
                        <label class="form-label" for="f-description">Description <span class="req">*</span></label>
                        <textarea id="f-description" class="form-control"
                            placeholder="Full details, steps to reproduce, expected vs actual behaviour…"></textarea>
                        <div class="form-error" id="e-description"></div>
                    </div>

                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
                <button class="btn btn-primary" id="create-btn" onclick="submitCreate()">Create Ticket</button>
            </div>
        </div>
    </div>


    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
